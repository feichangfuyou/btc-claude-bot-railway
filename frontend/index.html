  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DoYou.trade",
      "url": "https://doyou.trade",
      "logo": "https://doyou.trade/Bravo.svg",
      "sameAs": [
        "https://twitter.com/doyoutrade",
        "https://github.com/doyoutrade"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@doyou.trade",
        "contactType": "customer support"
      }
    }
  </script>

  <!-- Structured Data: WebSite -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://doyou.trade",
      "name": "DoYou.trade",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://doyou.trade/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <!-- Structured Data: SoftwareApplication -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "DoYou.trade",
      "operatingSystem": "Web",
      "applicationCategory": "FinancingApplication",
      "description": "Professional AI-powered crypto trading terminal with advanced algorithmic strategies and real-time market insights.",
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
      }
    }
  </script>
  
  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is DoYou.trade a custodial platform?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. DoYou.trade is 100% non-custodial. Your funds always remain in your own exchange account (Coinbase, Binance, or Kraken). We only execute trades on your behalf using API keys with withdrawal permissions strictly disabled."
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI 'Brain' make trading decisions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Brain utilizes advanced neural networks to process millions of data points every second, including price action, technical indicators, global news sentiment, and on-chain liquidity flows. It identifies high-probability setups and executes with millisecond precision."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need prior trading experience?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Not at all. While professional traders use our advanced tools, beginners can leverage our 100+ expert trading presets. Simply connect your exchange, pick a strategy that matches your risk profile, and let the Brain handle the technical execution."
          }
        }
      ]
    }
  </script>
