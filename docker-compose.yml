services:
  claudebot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
      - bot-backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  bot-data:
  bot-logs:
  bot-backups:
